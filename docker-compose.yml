# docker-compose.yml

services:
  postgres:
    image: postgres:16
    container_name: helix-postgres
    restart: always
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: helix123
      POSTGRES_DB: helix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: